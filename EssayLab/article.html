<html>
    <head>
        <title>你好世界 - 随笔阁</title>
        <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
        <link rel="stylesheet" href="./Static/github-dark.min.css">
        <style>
            body{
                -webkit-user-select: none;
                -ms-user-select: none;
                user-select: none;
                
                margin:0px 0px;
                font-family:'ImportFont';
                background-color:#000;
                color:#FFF;
            }
            .hljs{
                font-family: 'ImportFont';
            }
            @font-face {
                font-family: 'ImportFont';
                src: url('./Static/SourceHanSansCN-Bold-2.otf');
            }
            .headbar{
                background-color: #222;
                display: flex;
                padding: 10px;
            }
            .ret{
                background-color: #444;
                padding:10px;
                cursor: pointer;
                font-size: 1.2rem;
                border-radius: 8px;
                transition: .1s background ease-in-out;
            }
            .ret:hover{
                background-color: #666;
            }
            .title{
                padding:10px;
                font-size: 1.2rem;
                border-radius: 8px;
                transition: .1s background ease-in-out;
            }
            h1{font-size: 2.6rem}
            h2{font-size: 2.3rem}
            h3{font-size: 2.0rem}
            h4{font-size: 1.8rem}
            h5{font-size: 1.5rem}
            p{font-size: 1.2rem}
        </style>
        <script src="./Static/marked.min.js"></script>
        <script src="./Static/highlight.min.js"></script>
        <script src="./Static/mermaid.min.js"></script>
        <script>
            var markfile = getCookie('md')
            /// Load Markdown
            window.onload = function(){
                fetch('./Articles/'+markfile)
                .then(function(response){
                    return response.text()
                }).then(function(response){
                    document.getElementById('marked-content').innerHTML 
                    = marked.parse(response);
                    hljs.highlightAll();
                    mermaid.init({startOnLoad:false},".language-mermaid");
                    // Loaded marked , hljs , mermaid
                    Array.from(document.getElementsByClassName('language-mermaid')).forEach((element)=>{
                        element.parentNode.style='background-color:#EEE;display:flex;justify-content:center;';
                    })
                })
                var title = getCookie('title')
                document.getElementById('title').innerHTML = title
            }
            // Libraries
            document.onkeydown = function(){
                if(window.event && window.event.keyCode == 123) {
                    alert("为了保密性,开发者工具于此界面被禁用");
                    event.keyCode=0;
                    event.returnValue=false;
                }
            }
            function getCookie(name){
                var arr,reg=new RegExp("(^| )"+name+"=([^;]*)(;|$)");
                if(arr=document.cookie.match(reg)) return unescape(arr[2]);
                else return null;
            }
            //
            if (getCookie('KEY')!='CODESINSIDEWITHNOTHINGYOUWANT'){
                // window.open('./index.html','_self')
            }
        </script>
    </head>
    <body>
        <div class='headbar'>
            <div class="ret" onclick='window.open("./index.html","_self")'>返回上页</div>
            <div class='title' id='title'></div>
        </div>
        <div id='marked-content'></div>
    </body>
</html>
